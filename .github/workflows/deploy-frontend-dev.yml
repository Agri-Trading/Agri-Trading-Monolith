name: Deploy Frontend to Azure App Service (Dev)

on:
  push:
    branches: [main]
    paths:
      - "Lotexa.Web/**"
      - ".github/workflows/deploy-frontend-dev.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Lotexa.Web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Lotexa.Web

      - name: Build Next.js app
        run: npm run build
        working-directory: Lotexa.Web

      - name: Prepare standalone package
        run: |
          cp -r Lotexa.Web/.next/static Lotexa.Web/.next/standalone/.next/static
          if [ -d "Lotexa.Web/public" ]; then
            cp -r Lotexa.Web/public Lotexa.Web/.next/standalone/public
          fi
          echo '{"scripts":{"start":"HOSTNAME=0.0.0.0 node server.js"}}' > Lotexa.Web/.next/standalone/package.json
          cd Lotexa.Web/.next/standalone
          zip -r ../../../frontend.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend.zip
